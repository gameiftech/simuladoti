<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulado Ponderado</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a5a8a'/%3E%3Ctext x='50' y='68' font-size='50' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        /* Reset e estilo global */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f6fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            padding-top: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 20px 18px 30px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            background: #1a5a8a;
            color: white;
            font-size: 13px;
            font-weight: 600;
            border-radius: 30px;
            padding: 4px 14px;
            white-space: nowrap;
        }
        .badge-rand {
            background: #e67e22;
            color: white;
            font-size: 12px;
            font-weight: 600;
            border-radius: 30px;
            padding: 5px 14px;
            white-space: nowrap;
        }
        .progress-bar {
            background: #e9eef4;
            border-radius: 20px;
            height: 6px;
            width: 100%;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #1a5a8a;
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #2c3e50;
            background: #f0f5fb;
            padding: 10px 16px;
            border-radius: 40px;
            margin-bottom: 18px;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 4px;
        }
        .info-row .acertos { color: #1d7e3a; }
        .info-row .erros { color: #b13a3a; }
        .info-row .pontos { color: #1a5a8a; font-weight: 700; }

        .pergunta {
            font-size: 18px;
            font-weight: 600;
            color: #0b2b4a;
            margin-bottom: 20px;
            line-height: 1.5;
            min-height: 70px;
        }
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .opcao {
            background: #f9fcff;
            border: 2px solid #dde6ef;
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 14px;
            touch-action: manipulation;
            user-select: none;
        }
        .opcao:active:not(.desabilitada) {
            transform: scale(0.97);
            background: #eef5fc;
        }
        .opcao .letra {
            background: #dce6f0;
            color: #1a3e5c;
            font-weight: 700;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            font-size: 15px;
        }
        .opcao.selecionada { border-color: #1a5a8a; background: #e1edfa; }
        .opcao.selecionada .letra { background: #1a5a8a; color: white; }
        .opcao.correto { border-color: #1d7e3a; background: #e2f3e5; }
        .opcao.correto .letra { background: #1d7e3a; color: white; }
        .opcao.errado { border-color: #b13a3a; background: #fde8e8; }
        .opcao.errado .letra { background: #b13a3a; color: white; }
        .opcao.desabilitada { cursor: default; opacity: 0.9; }
        .opcao.desabilitada:active { transform: none !important; }

        .feedback {
            padding: 14px 18px;
            border-radius: 16px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            font-size: 16px;
        }
        .feedback.correto { display: block; background: #dff0e4; color: #0f5829; border-left: 6px solid #1d7e3a; }
        .feedback.errado { display: block; background: #fce4e4; color: #8f2a2a; border-left: 6px solid #b13a3a; }

        .botoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .botoes button {
            background: #e6edf5;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            color: #1a3e5c;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 80px;
            touch-action: manipulation;
        }
        .botoes button:active:not(:disabled) { transform: scale(0.95); background: #cbdbe9; }
        .botoes button.primario { background: #1a5a8a; color: white; }
        .botoes button.primario:active:not(:disabled) { background: #0f4166; }
        .botoes button.perigo { background: #b13a3a; color: white; }
        .botoes button.perigo:active:not(:disabled) { background: #8f2a2a; }
        .botoes button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        #resultado {
            display: none;
            text-align: center;
            padding: 20px 10px 10px;
        }
        #resultado h2 { font-size: 26px; color: #0b2b4a; margin-bottom: 4px; }
        #resultado .nota {
            font-size: 56px;
            font-weight: 700;
            color: #1a5a8a;
            margin: 8px 0;
        }
        #resultado .detalhes { font-size: 18px; color: #2c3e50; }
        .resumo-box {
            background: #f0f5fb;
            padding: 16px;
            border-radius: 20px;
            display: inline-block;
            margin: 16px auto 0;
            font-size: 17px;
        }
        .resumo-box .verde { color: #1d7e3a; font-weight: 700; }
        .resumo-box .vermelho { color: #b13a3a; font-weight: 700; }
        .resumo-box .azul { color: #1a5a8a; font-weight: 700; }
        .btn-reiniciar {
            margin-top: 24px;
            background: #1a5a8a;
            color: white;
            padding: 16px 44px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            width: 100%;
            max-width: 280px;
        }
        .btn-reiniciar:active { transform: scale(0.96); background: #0f4166; }

        @media (max-width: 480px) {
            .container { padding: 16px 14px; border-radius: 24px; }
            .header h1 { font-size: 20px; }
            .pergunta { font-size: 17px; }
            .opcao { padding: 15px 14px; font-size: 15px; }
            .botoes button { font-size: 15px; padding: 12px 14px; }
            .info-row { font-size: 13px; padding: 8px 12px; }
            .badge-rand { font-size: 11px; padding: 3px 10px; }
        }
        @media (max-width: 380px) {
            .header h1 { font-size: 17px; }
            .pergunta { font-size: 15px; }
            .opcao { font-size: 14px; padding: 12px 12px; }
            .botoes button { font-size: 13px; padding: 10px 10px; min-width: 60px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <h1>📘 <span>Simulado 40 Questões</span></h1>
        <span class="badge-rand">🔀 Aleatório</span>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="info-row">
        <span><strong id="numAtual">1</strong>/<span id="totalQuestoes">40</span></span>
        <span>
            <span class="acertos">✅ <span id="acertos">0</span></span> |
            <span class="erros">❌ <span id="erros">0</span></span> |
            <span class="pontos">⭐ <span id="pontuacao">0</span> pts</span> |
            <span class="restantes">⏳ <span id="restantes">40</span></span>
        </span>
    </div>

    <div id="questaoArea">
        <div class="pergunta" id="pergunta">Carregando...</div>
        <div class="opcoes" id="opcoesContainer"></div>
        <div class="feedback" id="feedback"></div>

        <div class="botoes">
            <button id="btnAnterior" disabled>◀</button>
            <button id="btnVerificar" class="primario" disabled>Verificar</button>
            <button id="btnProxima">▶</button>
            <button id="btnFinalizar" class="perigo">Finalizar</button>
        </div>
    </div>

    <div id="resultado">
        <h2>🏁 Concluído!</h2>
        <div class="nota" id="notaFinal">0%</div>
        <div class="detalhes">
            Você acertou <strong id="totalAcertosFinal">0</strong> de <strong id="totalQuestoesFinal">40</strong> questões.
            <br>
            Pontuação: <strong id="pontuacaoFinal">0</strong> de <strong id="pontuacaoMaxima">82</strong> pontos.
        </div>
        <div class="resumo-box">
            <span class="verde">✅ Acertos: <span id="resumoAcertos">0</span></span>
            &nbsp;|&nbsp;
            <span class="vermelho">❌ Erros: <span id="resumoErros">0</span></span>
            &nbsp;|&nbsp;
            <span class="azul">⭐ Pontos: <span id="resumoPontos">0</span></span>
        </div>
        <button class="btn-reiniciar" onclick="novoSimulado()">🔄 Novo simulado</button>
    </div>
</div>

<script>
    // ============================================================
    // BANCO DE 400 QUESTÕES COM PESOS POR ÁREA
    // ============================================================
    function gerarBancoCompleto() {
        // Função auxiliar: p=pergunta, o=opções, c=correta (índice), area='portugues'|'matematica'|'administracao'|'ti'
        const q = (p, o, c, area) => {
            const pesos = { portugues: 1, matematica: 2, administracao: 2, ti: 3 };
            return { p, o, c, area, peso: pesos[area] || 1 };
        };

        // ---------- PORTUGUÊS (peso 1) ----------
        const portugues = [
            q('Leia o texto: "A transformação digital no setor público é um processo irreversível. No entanto, sua efetividade depende não apenas da tecnologia, mas também da capacitação de servidores e da adaptação cultural." O texto defende que:', ['A) A tecnologia é o único fator determinante.', 'B) A transformação digital é um processo reversível.', 'C) A efetividade depende de tecnologia, capacitação e mudança cultural.', 'D) A capacitação de servidores é desnecessária.'], 2, 'portugues'),
            q('Assinale a alternativa em que a concordância verbal está correta:', ['A) Haviam muitos problemas para resolver.', 'B) Fazem dois anos que trabalho aqui.', 'C) Mais de um analista participou do projeto.', 'D) Os Estados Unidos é um país desenvolvido.'], 2, 'portugues'),
            q('Em qual alternativa a regência verbal está correta?', ['A) O sistema visa atender os usuários.', 'B) Ele assistiu o filme sobre inovação.', 'C) O relatório implica em mudanças.', 'D) O analista obedece as normas.'], 0, 'portugues'),
            q('Assinale a opção em que a crase é facultativa:', ['A) Fomos à reunião.', 'B) Entreguei o documento à secretária.', 'C) Voltou à casa dos pais.', 'D) Refiro-me àquela versão.'], 2, 'portugues'),
            q('Em qual alternativa o termo "mal" é advérbio?', ['A) Ele tem um mal incurável.', 'B) O sistema funciona mal.', 'C) O mal foi identificado.', 'D) Sofreu um mal súbito.'], 1, 'portugues'),
            q('Assinale a alternativa com colocação pronominal correta:', ['A) Me entregaram o relatório.', 'B) O analista se dedicou ao projeto.', 'C) Não lhe posso informar.', 'D) O sistema, atualize-o.'], 1, 'portugues'),
            q('Leia: "Os dados, que foram validados, estão disponíveis." A oração destacada é:', ['A) Subordinada adjetiva restritiva.', 'B) Subordinada adjetiva explicativa.', 'C) Coordenada explicativa.', 'D) Subordinada substantiva objetiva.'], 1, 'portugues'),
            q('Em qual alternativa "por que" está corretamente empregado?', ['A) Não sei por que o sistema falhou.', 'B) Ele explicou o por que da decisão.', 'C) O motivo por que não me responderam.', 'D) Todos sabem por que motivo.'], 0, 'portugues'),
            q('Assinale a alternativa com erro de ortografia:', ['A) O sistema está em fase de implantação.', 'B) Houve uma excessão na regra.', 'C) A equipe está empenhada.', 'D) O projeto foi concluído.'], 1, 'portugues'),
            q('Em qual alternativa a palavra "a" é preposição?', ['A) A equipe trabalhou.', 'B) Fomos a Brasília.', 'C) A sistema falhou.', 'D) Aquele relatório é antigo.'], 1, 'portugues'),
            q('Leia: "Caso o sistema apresente falhas, os analistas serão acionados." A oração destacada expressa:', ['A) Condição', 'B) Concessão', 'C) Causa', 'D) Finalidade'], 0, 'portugues'),
            q('Assinale a alternativa em que a palavra "sessão" está correta:', ['A) A sessão de cinema foi cancelada.', 'B) A seção de TI foi reformada.', 'C) A sessão de trabalho foi produtiva.', 'D) A seção de documentos foi digitalizada.'], 0, 'portugues'),
            q('Em qual alternativa há erro de concordância verbal?', ['A) Mais de um analista participou.', 'B) Haviam muitas pendências.', 'C) Fazem três meses que o sistema foi implantado.', 'D) Os Estados Unidos investem em tecnologia.'], 1, 'portugues'),
            q('Assinale a alternativa em que o termo destacado é adjunto adnominal:', ['A) O **relatório** foi aprovado.', 'B) O sistema **inovador** foi testado.', 'C) **Todos** os dados foram analisados.', 'D) O analista **de TI** apresentou a solução.'], 1, 'portugues'),
            q('Em qual alternativa a palavra "mas" é uma conjunção adversativa?', ['A) Ele trabalhou bastante, mas não concluiu.', 'B) Mas que belo sistema!', 'C) Ele é competente, mas não é experiente.', 'D) Mas ele chegou tarde.'], 0, 'portugues'),
            q('Leia o fragmento: "A segurança da informação é fundamental para garantir a confiabilidade dos dados." A palavra "confiabilidade" pode ser substituída por:', ['A) Integridade', 'B) Disponibilidade', 'C) Autenticidade', 'D) Fidedignidade'], 3, 'portugues'),
            q('Assinale a alternativa em que a pontuação está correta:', ['A) O analista, que é competente, foi promovido.', 'B) O analista que é competente, foi promovido.', 'C) O analista que é competente foi promovido, rapidamente.', 'D) O analista, que é competente foi promovido.'], 0, 'portugues'),
            q('Em qual alternativa a palavra "cerca" tem o mesmo sentido de "aproximadamente"?', ['A) O fazendeiro construiu uma cerca.', 'B) Cerca de 50 sistemas foram atualizados.', 'C) A equipe cerca o inimigo.', 'D) Ele cerca a questão com cuidado.'], 1, 'portugues'),
            q('Assinale a alternativa em que a concordância nominal está correta:', ['A) É proibido a entrada.', 'B) Anexo as planilhas.', 'C) É necessária a atualização.', 'D) Bastante pessoas compareceram.'], 2, 'portugues'),
            q('Em qual alternativa a regência nominal está correta?', ['A) O analista é acessível a todos.', 'B) Ele é ansioso por atualizações.', 'C) O sistema é compatível com as normas.', 'D) Todos estão aptos ao cargo.'], 2, 'portugues'),
            q('Assinale a alternativa em que o pronome "se" indica reflexividade:', ['A) Vive-se bem com tecnologia.', 'B) O analista se feriu com o equipamento.', 'C) Precisa-se de novos servidores.', 'D) Alugam-se sistemas.'], 1, 'portugues'),
            q('Leia: "Os dados, os quais foram validados, estão disponíveis." O pronome "os quais" refere-se a:', ['A) Dados', 'B) Validados', 'C) Disponíveis', 'D) Sistema'], 0, 'portugues'),
            q('Assinale a alternativa em que a forma verbal está correta:', ['A) Ele interviu na discussão.', 'B) Quando ele vir aqui, avise-me.', 'C) Se ele ver o relatório, entenderá.', 'D) Ele não cabe no novo cargo.'], 3, 'portugues'),
            q('Em qual alternativa a palavra "faz" está empregada corretamente?', ['A) Faz dois anos que trabalho com TI.', 'B) Ele faz computação gráfica.', 'C) O sistema faz atualizações automáticas.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Assinale a alternativa em que a palavra "mau" está empregada corretamente:', ['A) O mau funcionamento do sistema causou problemas.', 'B) O analista está de mau humor.', 'C) O mau uso dos recursos é criticado.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Em qual alternativa a palavra "traz" está correta?', ['A) O sistema traz muitas vantagens.', 'B) Ele traz o relatório hoje.', 'C) O novo software traz inovações.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "Embora o sistema seja moderno, ele apresenta falhas." A oração destacada expressa:', ['A) Concessão', 'B) Causa', 'C) Condição', 'D) Finalidade'], 0, 'portugues'),
            q('Assinale a alternativa em que a palavra "sobre" é preposição:', ['A) O relatório sobre o projeto foi entregue.', 'B) Sobre a mesa há documentos.', 'C) O sistema sobre a nuvem.', 'D) A equipe sobre o novo desafio.'], 0, 'portugues'),
            q('Em qual alternativa a palavra "contra" é preposição?', ['A) Ele votou contra a proposta.', 'B) Contra a parede.', 'C) A equipe lutou contra o prazo.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Assinale a alternativa em que "perante" está corretamente empregado:', ['A) O relatório foi apresentado perante a diretoria.', 'B) Perante a crise, tomamos medidas.', 'C) A equipe se comprometeu perante o cliente.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "Após a atualização, o sistema ficou mais rápido." O termo "Após" expressa:', ['A) Tempo', 'B) Causa', 'C) Concessão', 'D) Comparação'], 0, 'portugues'),
            q('Assinale a alternativa em que "porquê" está correto:', ['A) Não sei o porquê do problema.', 'B) Ele explicou o porquê da escolha.', 'C) O porquê ainda não foi descoberto.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Em qual alternativa há erro de concordância nominal?', ['A) Anexo os documentos.', 'B) Seguem anexas as planilhas.', 'C) É proibida a entrada.', 'D) Bastante gente compareceu.'], 0, 'portugues'),
            q('Assinale a alternativa em que "descendente" está corretamente grafada:', ['A) A árvore genealógica mostra os descendentes.', 'B) O sistema é descendente de uma versão anterior.', 'C) Todos os descendentes foram informados.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "O sistema será atualizado, conforme previsto no cronograma." A palavra "conforme" expressa:', ['A) Conformidade', 'B) Causa', 'C) Finalidade', 'D) Consequência'], 0, 'portugues'),
            q('Assinale a alternativa em que "imigrante" está correta:', ['A) O imigrante trouxe suas tecnologias.', 'B) O país recebe muitos imigrantes.', 'C) O imigrante se adaptou à nova cultura.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Em qual alternativa "emergir" está corretamente empregado?', ['A) O sistema emergiu como solução.', 'B) Novas tecnologias emergem a cada dia.', 'C) O projeto emergiu das cinzas.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Assinale a alternativa em que "pressupor" está corretamente empregado:', ['A) O analista pressupôs a falha.', 'B) Pressuponho que o sistema está estável.', 'C) Eles pressupuseram os riscos.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "Os dados foram analisados, uma vez que a equipe estava preparada." A expressão "uma vez que" expressa:', ['A) Causa', 'B) Tempo', 'C) Condição', 'D) Concessão'], 0, 'portugues'),
            q('Assinale a alternativa em que a palavra "entre" é preposição:', ['A) Entre os sistemas, escolhi o mais rápido.', 'B) O relatório está entre os documentos.', 'C) Ele ficou entre a espada e a parede.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Em qual alternativa a palavra "sem" é preposição?', ['A) Ficou sem o sistema.', 'B) Sem ele, nada funciona.', 'C) A equipe trabalhou sem descanso.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Assinale a alternativa em que "com" é preposição:', ['A) Trabalhou com a equipe.', 'B) Com o sistema novo, tudo melhorou.', 'C) Contou com o apoio da diretoria.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "O analista, cujo relatório foi aprovado, é muito competente." O pronome "cujo" estabelece relação de:', ['A) Posse', 'B) Causa', 'C) Consequência', 'D) Comparação'], 0, 'portugues'),
            q('Assinale a alternativa em que "onde" está corretamente empregado:', ['A) O sistema onde os dados são armazenados.', 'B) O local onde ocorreu a reunião.', 'C) O ambiente onde o sistema opera.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Em qual alternativa "aonde" está correto?', ['A) Aonde você vai?', 'B) Vou aonde o sistema me levar.', 'C) Aonde se dirigiu a equipe?', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Assinale a alternativa em que "menos" é advérbio:', ['A) Menos pessoas compareceram.', 'B) Ele tem menos experiência.', 'C) O sistema é menos rápido.', 'D) Todas as alternativas.'], 3, 'portugues'),
            q('Leia: "A equipe trabalhou muito, de modo que o projeto foi concluído." A expressão "de modo que" expressa:', ['A) Consequência', 'B) Causa', 'C) Finalidade', 'D) Condição'], 0, 'portugues'),
            q('Assinale a alternativa em que "além" é advérbio:', ['A) Além do sistema, há outros fatores.', 'B) Ele foi além do esperado.', 'C) O projeto está além da meta.', 'D) Todas as alternativas.'], 3, 'portugues'),

            q('Assinale a alternativa em que "salvo" é preposição:', ['A) Salvo o sistema, tudo estava ok.', 'B) Foi salvo pelo sistema.', 'C) O sistema salvou os dados.', 'D) Salvo seja o analista.'], 0, 'portugues'),

            q('O que é um arquivo de log?', ['A) Um registro de eventos gerados por sistemas.', 'B) Um tipo de vírus.', 'C) Um firewall.', 'D) Um backup.'], 0, 'ti'),
            q('Em redes, o que é o protocolo HTTP?', ['A) Protocolo para comunicação entre navegador e servidor web.', 'B) Protocolo para transferir arquivos.', 'C) Protocolo para enviar e-mails.', 'D) Protocolo para resolver nomes.'], 0, 'ti'),
            q('Em banco de dados, o que é uma transação?', ['A) Uma sequência de operações executadas como uma unidade.', 'B) Um tipo de consulta.', 'C) Uma tabela.', 'D) Um índice.'], 0, 'ti'),
            q('O que é uma falha de segurança?', ['A) Uma vulnerabilidade que pode ser explorada.', 'B) Um patch aplicado.', 'C) Um firewall.', 'D) Um antivírus.'], 0, 'ti'),
            q('Em metodologias ágeis, o que é o Burndown Chart?', ['A) Um gráfico que mostra o progresso do trabalho restante.', 'B) Um gráfico de custos.', 'C) Um gráfico de bugs.', 'D) Um gráfico de entregas.'], 0, 'ti'),
            q('O que é um cliente-servidor?', ['A) Um modelo onde clientes requisitam serviços de um servidor.', 'B) Um modelo peer-to-peer.', 'C) Um modelo sem servidores.', 'D) Um modelo com apenas servidores.'], 0, 'ti')
        ];

        // Junta tudo e garante pelo menos 400 (completando com extras se necessário)
        let full = [...portugues, ...matematica, ...adm, ...ti];
        // Garantir que temos exatamente 400 (se faltar, adicionar questões extras)
        while (full.length < 400) {
            full.push(q('Questão extra: Qual é a capital do Brasil?', ['A) São Paulo', 'B) Rio de Janeiro', 'C) Brasília', 'D) Belo Horizonte'], 2, 'administracao'));
        }
        return full;
    }

    // ============================================================
    // ESTADO DO SIMULADO
    // ============================================================
    let bancoGlobal = [];
    let questoesAtuais = [];
    let indiceAtual = 0;
    let respostas = [];
    let verificadas = [];
    let acertos = 0;
    let erros = 0;
    let pontuacao = 0;      // soma dos pesos das questões acertadas
    let totalPesos = 0;     // soma dos pesos de todas as questões (para cálculo do percentual)
    let finalizado = false;

    // DOM
    const perguntaEl = document.getElementById('pergunta');
    const opcoesContainer = document.getElementById('opcoesContainer');
    const feedbackEl = document.getElementById('feedback');
    const numAtualEl = document.getElementById('numAtual');
    const totalQuestoesEl = document.getElementById('totalQuestoes');
    const acertosEl = document.getElementById('acertos');
    const errosEl = document.getElementById('erros');
    const pontuacaoEl = document.getElementById('pontuacao');
    const restantesEl = document.getElementById('restantes');
    const progressFill = document.getElementById('progressFill');
    const btnAnterior = document.getElementById('btnAnterior');
    const btnProxima = document.getElementById('btnProxima');
    const btnVerificar = document.getElementById('btnVerificar');
    const btnFinalizar = document.getElementById('btnFinalizar');
    const questaoArea = document.getElementById('questaoArea');
    const resultadoDiv = document.getElementById('resultado');

    // ============================================================
    // FUNÇÕES
    // ============================================================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function carregarQuestao(index) {
        const q = questoesAtuais[index];
        if (!q) return;

        perguntaEl.textContent = q.p;
        opcoesContainer.innerHTML = '';
        q.o.forEach((texto, i) => {
            const div = document.createElement('div');
            div.className = 'opcao';
            div.dataset.index = i;
            div.innerHTML = `<span class="letra">${String.fromCharCode(65 + i)}</span> ${texto}`;
            div.addEventListener('click', () => selecionarOpcao(index, i));
            opcoesContainer.appendChild(div);
        });

        const resp = respostas[index];
        const opcoes = opcoesContainer.querySelectorAll('.opcao');
        opcoes.forEach((el, i) => {
            el.classList.remove('selecionada', 'correto', 'errado', 'desabilitada');
            if (resp === i) el.classList.add('selecionada');
            if (verificadas[index]) {
                el.classList.add('desabilitada');
                if (i === q.c) el.classList.add('correto');
                else if (resp === i && resp !== q.c) el.classList.add('errado');
            }
        });

        if (verificadas[index]) {
            const acertou = (resp === q.c);
            feedbackEl.className = 'feedback ' + (acertou ? 'correto' : 'errado');
            feedbackEl.style.display = 'block';
            feedbackEl.innerHTML = acertou ? '✅ Correto!' : `❌ Incorreto. Resposta: ${String.fromCharCode(65 + q.c)}`;
        } else {
            feedbackEl.style.display = 'none';
            feedbackEl.className = 'feedback';
        }

        const total = questoesAtuais.length;
        const respondidas = verificadas.filter(v => v).length;
        numAtualEl.textContent = index + 1;
        totalQuestoesEl.textContent = total;
        acertosEl.textContent = acertos;
        errosEl.textContent = erros;
        pontuacaoEl.textContent = pontuacao;
        restantesEl.textContent = total - respondidas;
        progressFill.style.width = ((index + 1) / total * 100) + '%';

        btnAnterior.disabled = (index === 0);
        btnProxima.disabled = (index === total - 1);
        btnVerificar.disabled = (respostas[index] === null || verificadas[index]);
    }

    function selecionarOpcao(indexQuestao, indexOpcao) {
        if (finalizado) return;
        if (verificadas[indexQuestao]) return;
        respostas[indexQuestao] = indexOpcao;
        const opcoes = opcoesContainer.querySelectorAll('.opcao');
        opcoes.forEach((el, i) => el.classList.toggle('selecionada', i === indexOpcao));
        btnVerificar.disabled = false;
    }

    function verificarQuestao() {
        const index = indiceAtual;
        if (verificadas[index]) return;
        const resp = respostas[index];
        if (resp === null) return;

        const q = questoesAtuais[index];
        const acertou = (resp === q.c);
        verificadas[index] = true;
        if (acertou) {
            acertos++;
            pontuacao += q.peso;   // soma o peso da questão acertada
        } else {
            erros++;
        }

        const total = questoesAtuais.length;
        const respondidas = verificadas.filter(v => v).length;
        acertosEl.textContent = acertos;
        errosEl.textContent = erros;
        pontuacaoEl.textContent = pontuacao;
        restantesEl.textContent = total - respondidas;

        feedbackEl.className = 'feedback ' + (acertou ? 'correto' : 'errado');
        feedbackEl.style.display = 'block';
        feedbackEl.innerHTML = acertou ? '✅ Correto!' : `❌ Incorreto. Resposta: ${String.fromCharCode(65 + q.c)}`;

        const opcoes = opcoesContainer.querySelectorAll('.opcao');
        opcoes.forEach((el, i) => {
            el.classList.add('desabilitada');
            if (i === q.c) el.classList.add('correto');
            else if (i === resp && resp !== q.c) el.classList.add('errado');
        });
        btnVerificar.disabled = true;
    }

    function irParaProxima() {
        if (!verificadas[indiceAtual] && respostas[indiceAtual] !== null) {
            verificarQuestao();
        }
        if (indiceAtual < questoesAtuais.length - 1) {
            indiceAtual++;
            carregarQuestao(indiceAtual);
        }
    }

    function irParaAnterior() {
        if (indiceAtual > 0) {
            indiceAtual--;
            carregarQuestao(indiceAtual);
        }
    }

    function finalizarSimulado() {
        const naoVerificadas = verificadas.some(v => v === false);
        if (naoVerificadas) {
            const confirmar = confirm('Ainda há questões não verificadas. Finalizar mesmo assim?');
            if (!confirmar) return;
        }
        finalizado = true;
        questaoArea.style.display = 'none';
        resultadoDiv.style.display = 'block';

        // Calcula o total de pesos possíveis (soma dos pesos de todas as questões)
        let totalPesosPossiveis = 0;
        questoesAtuais.forEach(q => totalPesosPossiveis += q.peso);

        document.getElementById('totalAcertosFinal').textContent = acertos;
        document.getElementById('totalQuestoesFinal').textContent = questoesAtuais.length;
        document.getElementById('resumoAcertos').textContent = acertos;
        document.getElementById('resumoErros').textContent = erros;
        document.getElementById('resumoPontos').textContent = pontuacao;
        document.getElementById('pontuacaoFinal').textContent = pontuacao;
        document.getElementById('pontuacaoMaxima').textContent = totalPesosPossiveis;

        const pct = Math.round((pontuacao / totalPesosPossiveis) * 100);
        document.getElementById('notaFinal').textContent = pct + '%';
    }

    function novoSimulado() {
        const banco = bancoGlobal.length ? bancoGlobal : gerarBancoCompleto();
        bancoGlobal = banco;
        const selecionadas = [];
        const copia = [...banco];
        for (let i = 0; i < 40; i++) {
            const idx = Math.floor(Math.random() * copia.length);
            selecionadas.push(copia.splice(idx, 1)[0]);
        }
        questoesAtuais = selecionadas;
        indiceAtual = 0;
        respostas = new Array(questoesAtuais.length).fill(null);
        verificadas = new Array(questoesAtuais.length).fill(false);
        acertos = 0;
        erros = 0;
        pontuacao = 0;
        finalizado = false;

        resultadoDiv.style.display = 'none';
        questaoArea.style.display = 'block';
        acertosEl.textContent = 0;
        errosEl.textContent = 0;
        pontuacaoEl.textContent = 0;
        restantesEl.textContent = questoesAtuais.length;
        carregarQuestao(0);
    }

    // ============================================================
    // EVENTOS
    // ============================================================
    btnProxima.addEventListener('click', irParaProxima);
    btnAnterior.addEventListener('click', irParaAnterior);
    btnVerificar.addEventListener('click', verificarQuestao);
    btnFinalizar.addEventListener('click', finalizarSimulado);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' && !btnProxima.disabled) irParaProxima();
        if (e.key === 'ArrowLeft' && !btnAnterior.disabled) irParaAnterior();
        if (e.key === 'Enter' && !btnVerificar.disabled) verificarQuestao();
    });

    // ============================================================
    // INICIAR
    // ============================================================
    bancoGlobal = gerarBancoCompleto();
    novoSimulado();
</script>
</body>
</html>
